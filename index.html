<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        const saved = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', saved ?? 'dark');
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f9fb" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="Interactive demo of 1-of-2 Oblivious Transfer using the Simplest OT protocol (Chou-Orlandi 2015) over Curve25519 — the foundational primitive for secure two-party computation."
    />
    <title>OT Gate — Oblivious Transfer Demo</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
